{% extends "base_generic.html" %}

{% block sidebar %}
  {{ block.super }}
  {% if user.is_authenticated %}
  <hr>
  <ul class="sidebar-nav">
    <li><a href="{% url 'profile-update' %}">Edit Profile</a></li>
    <li><a href="{% url 'profile-delete' %}">Delete Account</a></li>
  </ul>
  {% endif %}
{% endblock %}

{% block content %}
  <h1>User: {{ user.username }}</h1>


  <p>
    {{user.bio}}
  </p>
{% endblock %}
